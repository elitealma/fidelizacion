version: '3.8'

services:
  web:
    image: ghcr.io/elitealma/fidelizacion:latest
    container_name: fidelizacion-web
    restart: always
    networks:
      - pegasus_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fidelizacion.rule=Host(`fidelizacion.pegasus360agency.com`)"
      - "traefik.http.routers.fidelizacion.entrypoints=websecure"
      - "traefik.http.routers.fidelizacion.tls.certresolver=myresolver" # Cambia myresolver al que uses en Traefik
      - "traefik.http.services.fidelizacion.loadbalancer.server.port=80"

networks:
  pegasus_net:
    external: true

